<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Londono Pro</title>
    <style>
        body { background-color: #0b0b0b; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        h1 { color: #FFD700; font-size: 24px; letter-spacing: 1px; font-weight: 900; }
        .status-card { background: #1a1a1a; padding: 18px; border-radius: 12px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid #444; }
        .good-service { border-left-color: #008000; }
        .disruption { border-left-color: #d40000; }
        .status-text { font-weight: 600; font-size: 14px; text-transform: uppercase; }
        .line-name { font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <h1>LONDONO PRO</h1>
    </div>

    <div id="status-list">Connecting to live London servers...</div>

    <script>
        async function getTubeStatus() {
            try {
                // Connecting to your Live Render Backend
                const response = await fetch('https://londono-service.onrender.com/status');
                const lines = await response.json();
                const container = document.getElementById('status-list');
                container.innerHTML = '';

                lines.forEach(line => {
                    const statusDesc = line.lineStatuses[0].statusSeverityDescription;
                    const isGood = statusDesc === "Good Service";
                    
                    const div = document.createElement('div');
                    div.className = `status-card ${isGood ? 'good-service' : 'disruption'}`;
                    div.innerHTML = `
                        <span class="line-name">${line.name}</span>
                        <span class="status-text">${statusDesc}</span>
                    `;
                    container.appendChild(div);
                });
            } catch (error) {
                document.getElementById('status-list').innerHTML = "Error connecting to Londono-Service.";
            }
        }
        getTubeStatus();
        setInterval(getTubeStatus, 60000); 
    </script>
</body>
</html>
